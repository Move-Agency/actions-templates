name: PHP App Container Build
on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
        description: AWS region for ECR
      project-name:
        required: true
        type: string
        description: Project name used as the image suffix prefix in ECR
      targets:
        required: true
        type: string
        description: |
          Whitespace-separated list of container build targets carrying PHP application logic.
          Each target name maps to support/container/<name>.containerfile and publishes as <project-name>-<name>.
      minimum-php-version:
        required: false
        type: string
        default: '8.3'
      php-extensions:
        required: false
        type: string
        default: ''
      runs-on:
        required: false
        type: string
        default: 'namespace-profile-ubuntu-nl'
    secrets:
      COMPOSER_AUTH:
        required: true
      container_deploy_role:
        required: true
        description: ARN for the AWS role that allows pushing to ECR

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  configure:
    if: ${{ github.event.repository.fork == false && github.event_name == 'push' && github.ref_protected }}
    runs-on: ubuntu-latest
    name: "Configure build matrix"
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Parse targets
        id: parse
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          set -euo pipefail
          MATRIX=$(jq --raw-input --slurp --compact-output '{target: (split("[[:space:],]+"; null) | map(select(length > 0)))}' <<< "$TARGETS")
          if [ "$(jq '.target | length' <<< "$MATRIX")" -eq 0 ]; then
            echo "::error::targets input must contain at least one entry"
            exit 1
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  collect-dependencies:
    if: ${{ github.event.repository.fork == false && github.event_name == 'push' && github.ref_protected }}
    runs-on: ubuntu-latest
    name: "Collect dependencies"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ inputs.minimum-php-version }}
          extensions: ${{ inputs.php-extensions }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer install --no-dev
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

      - name: Upload libraries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: libs
          path: vendor
          retention-days: 1

  build:
    needs: [configure, collect-dependencies]
    runs-on: ${{ inputs.runs-on }}
    name: "Build ${{ matrix.target }} Container"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.configure.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download libraries
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: libs
          path: vendor/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.container_deploy_role }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.target }}
            ${{ steps.login-ecr.outputs.registry }}/application-containers/${{ inputs.project-name }}-${{ matrix.target }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=branch,enable=${{ github.ref_name != 'master' }}
            type=ref,event=tag

      - name: Build and push container image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          push: true
          context: .
          file: support/container/${{ matrix.target }}.containerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.target }}:latest
          cache-to: type=inline
