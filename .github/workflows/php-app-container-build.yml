name: PHP App Container Build
on:
  workflow_call:
    inputs:
      target-env:
        required: true
        type: string
        description: Deployment environment name used for tagging and AWS role assumption (e.g. staging, production)
      project-name:
        required: true
        type: string
        description: Project name used as the image suffix prefix in ECR
      targets:
        required: true
        type: string
        description: |
          Whitespace-separated list of container build targets carrying PHP application logic.
          Each target name maps to support/container/<name>.containerfile and publishes as <project-name>-<name>.
      minimum-php-version:
        required: false
        type: string
        default: '8.3'
      php-extensions:
        required: false
        type: string
        default: ''
      runs-on:
        required: false
        type: string
        default: 'namespace-profile-ubuntu-nl'
    secrets:
      COMPOSER_AUTH:
        required: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  configure:
    if: ${{ github.event.repository.fork == false && (github.event_name != 'push' || github.ref_protected) }}
    runs-on: ubuntu-latest
    name: "Configure build matrix"
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Parse targets
        id: parse
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          set -euo pipefail
          MATRIX=$(jq --raw-input --slurp --compact-output '{target: (split("[[:space:],]+"; null) | map(select(length > 0)))}' <<< "$TARGETS")
          if [ "$(jq '.target | length' <<< "$MATRIX")" -eq 0 ]; then
            echo "::error::targets input must contain at least one entry"
            exit 1
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  collect-dependencies:
    if: ${{ github.event.repository.fork == false && (github.event_name != 'push' || github.ref_protected) }}
    runs-on: ubuntu-latest
    name: "Collect dependencies"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.minimum-php-version }}
          extensions: ${{ inputs.php-extensions }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer install --no-dev
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

      - name: Upload libraries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: libs
          path: vendor
          retention-days: 1

  build:
    needs: [configure, collect-dependencies]
    runs-on: ${{ inputs.runs-on }}
    name: "Build ${{ matrix.target }} Container"
    environment:
      name: ${{ inputs.target-env }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.configure.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download libraries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: libs
          path: vendor/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        if: ${{ github.ref_protected }}
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-deploy-${{ vars.AWS_BEANSTALK_ENVIRONMENT }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ github.ref_protected }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}
            ${{ github.ref_protected && format('{0}/{1}', steps.login-ecr.outputs.registry, vars.AWS_ECR_REPOSITORY) || '' }}
          flavor: |
            prefix=${{ matrix.target }}-,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=branch,enable=${{ github.ref_name != 'master' }}
            type=ref,event=tag

      - name: Build and push container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: ${{ github.ref_protected }}
          context: .
          file: support/container/${{ matrix.target }}.containerfile
          platforms: ${{ github.ref_protected && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: ${{ github.ref_protected }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}:${{ matrix.target }}-latest
          cache-to: type=inline
          outputs: ${{ (!github.ref_protected && (matrix.target == 'api' || matrix.target == 'cron')) && format('type=docker,dest=/tmp/{0}.tar', matrix.target) || '' }}

      - name: Upload container image artifact
        if: ${{ !github.ref_protected && (matrix.target == 'api' || matrix.target == 'cron') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}-image
          path: /tmp/${{ matrix.target }}.tar
          retention-days: 1
