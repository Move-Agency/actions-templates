name: PHP Project CI
on:
  workflow_call:
    inputs:
      coding-standard:
        required: true
        type: string
      minimum-php-version:
        required: true
        type: string
      stable-php-versions:
        required: true
        type: string
      experimental-php-versions:
        required: false
        type: string
        default: '[]'
      php-extensions:
        required: false
        type: string
        default: ''
      php-ini-settings:
        required: false
        type: string
        default: ''
      aws-region:
        required: true
        type: string
        description: AWS region for ECR
      project-name:
        required: true
        type: string
        description: Project name used as the image suffix prefix in ECR
      app-container-targets:
        required: true
        type: string
        description: |
          Whitespace-separated list of container build targets carrying PHP application logic.
          Each target name maps to support/container/<name>.containerfile and publishes as <project-name>-<name>.
      infra-container-targets:
        required: true
        type: string
        description: |
          Whitespace-separated list of infrastructure / sidecar container build targets (no PHP vendor download).
          Each target name maps to support/container/<name>.containerfile and publishes as <project-name>-<name>.
      php-api-memory-limit:
        required: false
        type: string
        default: '64M'
        description: Memory limit for the API container.
      php-cron-memory-limit:
        required: false
        type: string
        default: '64M'
        description: Memory limit for the cron container.

    secrets:
      COMPOSER_AUTH:
        required: false
      SLACK_WEBHOOK_URL:
        required: false
      CONTAINER_DEPLOY_ROLE:
        required: true
        description: ARN for the AWS role that allows pushing to ECR

permissions: {}

jobs:

  php:
    uses: lunr-php/actions-templates/.github/workflows/php-library.yml@c1391d5e0077a2dee6c151ea8be35edcb2b31af8 # 0.14.2
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    secrets:
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    with:
      coding-standard: ${{ inputs.coding-standard }}
      minimum-php-version: ${{ inputs.minimum-php-version }}
      stable-php-versions: ${{ inputs.stable-php-versions }}
      experimental-php-versions: ${{ inputs.experimental-php-versions }}
      php-extensions: ${{ inputs.php-extensions }}

  validate-di:
    uses: ./.github/workflows/php-validate-di.yml
    needs: [ php ]
    permissions:
      contents: read
    secrets:
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    with:
      stable-php-versions: ${{ inputs.stable-php-versions }}
      experimental-php-versions: ${{ inputs.experimental-php-versions }}
      php-extensions: ${{ inputs.php-extensions }}
      php-ini-settings: ${{ inputs.php-ini-settings }}

  app-containers:
    if: ${{ ( github.event_name == 'schedule' && github.event.repository.fork == false ) || github.event_name != 'schedule' }}
    needs: [ validate-di ]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/php-app-container-build.yml
    secrets:
      CONTAINER_DEPLOY_ROLE: ${{ secrets.CONTAINER_DEPLOY_ROLE }}
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
    with:
      aws-region: ${{ inputs.aws-region }}
      project-name: ${{ inputs.project-name }}
      targets: ${{ inputs.app-container-targets }}
      minimum-php-version: ${{ inputs.minimum-php-version }}
      php-extensions: ${{ inputs.php-extensions }}

  infra-containers:
    if: ${{ ( github.event_name == 'schedule' && github.event.repository.fork == false ) || github.event_name != 'schedule' }}
    needs: [ validate-di ]
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/php-infra-container-build.yml
    secrets:
      CONTAINER_DEPLOY_ROLE: ${{ secrets.CONTAINER_DEPLOY_ROLE }}
    with:
      aws-region: ${{ inputs.aws-region }}
      project-name: ${{ inputs.project-name }}
      targets: ${{ inputs.infra-container-targets }}

  functional-tests:
    if: ${{ (github.event_name == 'schedule' && github.event.repository.fork == false) || github.event_name != 'schedule' }}
    needs: [ app-containers ]
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
      packages: read
    uses: ./.github/workflows/functional-k6.yml
    with:
      project-name: ${{ inputs.project-name }}
      minimum-php-version: ${{ inputs.minimum-php-version }}
      php-extensions: ${{ inputs.php-extensions }}
      php-api-memory-limit: ${{ inputs.php-api-memory-limit }}
      php-cron-memory-limit: ${{ inputs.php-cron-memory-limit }}
    secrets:
      COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
