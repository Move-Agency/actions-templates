name: Functional Tests
on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
        description: 'Lowercase project name. Drives image names, container names, MySQL database, and uppercased env var prefix.'
      minimum-php-version:
        required: false
        type: string
        default: '8.3'
      php-extensions:
        required: false
        type: string
        default: ''
      php-api-memory-limit:
        required: false
        type: string
        default: '64M'
      php-cron-memory-limit:
        required: false
        type: string
        default: '64M'
    secrets:
      SLACK_WEBHOOK_URL:
        required: false
      COMPOSER_AUTH:
        required: true

env:
  SLACK_SEND_EVENTS: '["push", "schedule"]'

jobs:
  functional-tests:
    runs-on: ubuntu-latest
    name: Functional Tests
    timeout-minutes: 15
    permissions:
      contents: read
      issues: read
      checks: write
      packages: read
      pull-requests: write
    env:
      PROJECT_NAME: ${{ inputs.project-name }}
    services:
      mysql:
        image: mysql:8.0.44
        command: >-
          --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
          --group-concat-max-len=1048576
        env:
          MYSQL_ROOT_PASSWORD: actions
          MYSQL_DATABASE: ${{ inputs.project-name }}
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - name: Load database schema
        env:
          MYSQL_PWD: actions
          MYSQL_HOST: 127.0.0.1
          MYSQL_TCP_PORT: ${{ job.services.mysql.ports['3306'] }}
        run: |
          mysql -u root "${PROJECT_NAME}" < docs/database/schema.sql

      - name: Download api image
        if: ${{ !github.ref_protected }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-image
          path: /tmp/api

      - name: Load container images
        if: ${{ !github.ref_protected }}
        run: docker load -i /tmp/api/api.tar

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ inputs.minimum-php-version }}
          extensions: ${{ inputs.php-extensions }}
          ini-values: variables_order=EGPCS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache composer dependencies
        id: composer-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ github.workspace }}/vendor
          key: ${{ runner.os }}-php-${{ inputs.minimum-php-version }}-${{ hashFiles('composer.json', 'composer.lock') }}

      - name: Install dependencies
        run: composer install
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

      - name: Run setup
        run: ./support/setup.sh

      - name: Import data for functional tests
        env:
          ENVIRONMENT: ci
          PHP_MEMORY_LIMIT: ${{ inputs.php-cron-memory-limit }}
          MYSQL_PORT: ${{ job.services.mysql.ports['3306'] }}
        run: |
          export "${PROJECT_NAME^^}_DATABASE_RWHOST=127.0.0.1"
          export "${PROJECT_NAME^^}_DATABASE_ROHOST=127.0.0.1"
          export "${PROJECT_NAME^^}_DATABASE_PORT=${MYSQL_PORT}"
          export "${PROJECT_NAME^^}_DATABASE_USERNAME=root"
          export "${PROJECT_NAME^^}_DATABASE_PASSWORD=actions"
          export "${PROJECT_NAME^^}_DATABASE_DATABASE=${PROJECT_NAME}"
          export "${PROJECT_NAME^^}_DATABASE_DRIVER=mysql"
          just import-functional-data

      - name: Start API container
        env:
          MYSQL_PORT: ${{ job.services.mysql.ports['3306'] }}
          IMAGE_SHA: ${{ github.sha }}
          PHP_MEMORY_LIMIT: ${{ inputs.php-api-memory-limit }}
        run: |
          docker volume create "${PROJECT_NAME}-php-socket" >/dev/null
          docker run -d --name "${PROJECT_NAME}-api" \
            --network host \
            -v "${PROJECT_NAME}-php-socket:/php-socket" \
            -e ENVIRONMENT=ci \
            -e "PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT}" \
            -e "${PROJECT_NAME^^}_DATABASE_RWHOST=127.0.0.1" \
            -e "${PROJECT_NAME^^}_DATABASE_ROHOST=127.0.0.1" \
            -e "${PROJECT_NAME^^}_DATABASE_PORT=${MYSQL_PORT}" \
            -e "${PROJECT_NAME^^}_DATABASE_USERNAME=root" \
            -e "${PROJECT_NAME^^}_DATABASE_PASSWORD=actions" \
            -e "${PROJECT_NAME^^}_DATABASE_DATABASE=${PROJECT_NAME}" \
            -e "${PROJECT_NAME^^}_DATABASE_DRIVER=mysql" \
            --pull=${{ !github.ref_protected && 'never' || 'missing' }} \
            "ghcr.io/${{ github.repository }}:api-sha-${IMAGE_SHA}"

      - name: Start Nginx container
        run: |
          docker run -d --name "${PROJECT_NAME}-nginx" \
            --network host \
            -v "${PROJECT_NAME}-php-socket:/php-socket" \
            "ghcr.io/${{ github.repository }}:nginx-latest"

      - name: Wait for API to be ready
        run: |
          for _ in $(seq 1 30); do
            if curl -sfo /dev/null http://127.0.0.1:8080/elb-status; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become ready within 30s"
          echo "--- ${PROJECT_NAME}-api logs ---"
          docker logs "${PROJECT_NAME}-api" || true
          echo "--- ${PROJECT_NAME}-nginx logs ---"
          docker logs "${PROJECT_NAME}-nginx" || true
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1

      - name: Run k6 functional tests
        env:
          BASE_URL: http://127.0.0.1:8080
        run: just functional-tests

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "--- ${PROJECT_NAME}-api logs ---"
          docker logs "${PROJECT_NAME}-api" || true
          echo "--- ${PROJECT_NAME}-nginx logs ---"
          docker logs "${PROJECT_NAME}-nginx" || true

      - name: Stop containers
        if: always()
        run: |
          docker rm -f "${PROJECT_NAME}-api" "${PROJECT_NAME}-nginx" 2>/dev/null || true
          docker volume rm "${PROJECT_NAME}-php-socket" 2>/dev/null || true
