name: PHP Infra Container Build
on:
  workflow_call:
    inputs:
      project-name:
        required: true
        type: string
        description: Project name used as the image suffix prefix in ECR
      targets:
        required: true
        type: string
        description: |
          Whitespace-separated list of infrastructure / sidecar container build targets (no PHP vendor download).
          Each target name maps to support/container/<name>.containerfile and publishes as <project-name>-<name>.
      runs-on:
        required: false
        type: string
        default: 'namespace-profile-ubuntu-nl'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  configure:
    if: ${{ github.event.repository.fork == false && (github.event_name != 'push' || github.ref_protected) }}
    runs-on: ubuntu-latest
    name: "Configure build matrix"
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Parse targets
        id: parse
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          set -euo pipefail
          MATRIX=$(jq --raw-input --slurp --compact-output '{target: (split("[[:space:],]+"; null) | map(select(length > 0)))}' <<< "$TARGETS")
          if [ "$(jq '.target | length' <<< "$MATRIX")" -eq 0 ]; then
            echo "::error::targets input must contain at least one entry"
            exit 1
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    needs: [configure]
    runs-on: ${{ inputs.runs-on }}
    name: "Build ${{ matrix.target }} Container"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.configure.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}
          flavor: |
            prefix=${{ matrix.target }}-,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=${{ matrix.target }}-sha-,format=long
            type=ref,event=branch,enable=${{ github.ref_name != 'master' }}
            type=ref,event=tag

      - name: Build and push container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: ${{ github.ref_protected }}
          context: .
          file: support/container/${{ matrix.target }}.containerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}:${{ matrix.target }}-latest
          cache-to: type=inline
