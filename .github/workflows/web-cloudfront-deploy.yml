name: Web CloudFront deploy
on:
  workflow_call:
    inputs:
      environment:
        description: 'The environment to deploy to'
        default: 'Test'
        required: false
        type: string
      domain:
        description: 'The domain to deploy to'
        default: 'test.web.dap.aero'
        required: false
        type: string
      cloudfront-distribution-id:
        description: 'The ID of the cloudfront distribution'
        required: true
        type: string
      bucket-prefix:
        description: 'The prefix for upload buckets'
        required: true
        type: string
      node-version:
        description: 'Version of node to deploy with'
        default: '24.x'
        required: false
        type: string
      artifact-name:
        description: 'Artifact to deploy'
        default: build-24.x
        required: false
        type: string
    secrets:
      amazon_role:
        description: The AWS role to assume
        required: true
      npm_pat:
        description: The PAT for NPM registry access
        required: true

jobs:
  deploy_cloudfront:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    name: "Deploy to ${{ inputs.environment }} CloudFront"
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment }}
    steps:
      - name: Lowercase enviromnent name
        run: |
          echo "ENVIRONMENT=${ENVIRONMENT_NAME,,}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://npm.pkg.github.com
          cache: yarn

      - name: Install dependencies
        run: |
          yarn install --production=false --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PAT }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          name: ${{ inputs.artifact-name }}
          path: out

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.amazon_role }}

      - name: Deploy website
        env:
          DEPLOY_DISTRIBUTION_ID: "${{ inputs.cloudfront-distribution-id }}"
          DEPLOY_BUCKET_PREFIX: "${{ inputs.bucket-prefix }}"
          SITE_ROOT: "https://${{ inputs.domain }}"
        run: yarn deploy
