name: Build
on:
  workflow_call:
    inputs:
      environment:
        description: "The environment to deploy to"
        default: "Test"
        required: false
        type: string
      contentful_environment:
        description: "The Contentful environment to pull the data from"
        default: ""
        required: false
        type: string
      cache_build:
        description: "Cache the build files"
        default: false
        required: false
        type: boolean
      fast-runner:
        description: "Use a faster runner"
        default: false
        required: false
        type: boolean
      node-version:
        description: "Version of node to build on"
        default: "22.x"
        required: false
        type: string
      sub-site-id:
        description: "Identifier of the sub-website"
        default: ""
        required: false
        type: string
    secrets:
      npm_pat:
        description: The PAT for NPM registry access
        required: true
      sentry_auth_token:
        description: The token to access Sentry
        required: true
    outputs:
      artifact:
        description: "Artifact name"
        value: ${{ jobs.build.outputs.artifact }}
      sub-artifact:
        description: "Sub site artifact name"
        value: ${{ jobs.build.outputs.sub-artifact }}

jobs:
  build:
    runs-on: ${{ inputs.fast-runner && 'namespace-profile-web-16-core' || 'ubuntu-latest' }}
    name: "Build (node ${{ inputs.node-version }})"
    env:
      ENVIRONMENT_NAME: ${{ inputs.environment }}
    outputs:
      artifact: build-${{ inputs.node-version }}
      sub-artifact: build-sub-${{ inputs.node-version }}
    steps:
      - name: Lowercase enviromnent name
        run: |
          echo "ENVIRONMENT=${ENVIRONMENT_NAME,,}" >> "$GITHUB_ENV"
      - uses: namespacelabs/nscloud-setup@df198f982fcecfb8264bea3f1274b56a61b6dfdc # v0.0.12
        if: inputs.fast-runner

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Get version
        run: |
          describe=$(git describe --always --tags --abbrev=4)
          echo "GIT_DESCRIBE=$describe" >> "$GITHUB_ENV"
          version=$(echo "$describe" | sed -E 's/\-[a-z0-9]{5}//')
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Optionally set Contentful environment
        env:
          TMP_CONTENTFUL_ENVIRONMENT: ${{ inputs.contentful_environment }}
        run: |
          if [ -n "$TMP_CONTENTFUL_ENVIRONMENT" ]; then
             echo "CONTENTFUL_ENVIRONMENT=${TMP_CONTENTFUL_ENVIRONMENT,,}" >> "$GITHUB_ENV"
          fi

      - name: Set up Namespace yarn cache
        uses: namespacelabs/nscloud-cache-action@a90bb5d4b27522ce881c6e98eebd7d7e6d1653f9 # v1.4.2
        if: inputs.fast-runner
        with:
          cache: yarn

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: https://npm.pkg.github.com
          cache: yarn

      - name: Restore nextjs cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Restore build directory
        if: inputs.cache_build == true
        id: cache-build-restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          key: ${{ inputs.environment }}-${{ inputs.node-version }}-build
          path: out/

      - name: Install dependencies
        run: yarn install --production=false --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PAT }}

      - name: Install Phrase CLI
        if: hashFiles('.phraseapp.yml') != '' && !inputs.fast-runner
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install phrase

      - name: Build website
        env:
          GIT_COMMIT: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.sentry_auth_token }}
        run: yarn build

      - name: Upload website
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-${{ inputs.node-version }}
          path: out/
          retention-days: 1
          include-hidden-files: true

      - name: Save build
        id: cache-build-save
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          key: ${{ inputs.environment }}-${{ inputs.node-version }}-build
          path: out/

      - name: Clean build
        if: inputs.sub-site-id != ''
        run: yarn clean

      - name: Build website
        if: inputs.sub-site-id != ''
        env:
          GIT_COMMIT: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.sentry_auth_token }}
          SITE_ID: ${{ inputs.sub-site-id }}
        run: yarn build:sub-site

      - name: Upload website
        if: inputs.sub-site-id != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-sub-${{ inputs.node-version }}
          path: out/
          retention-days: 1
          include-hidden-files: true
