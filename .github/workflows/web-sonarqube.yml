name: SonarQube Scan

on:
    workflow_call:
        inputs:
            node-version:
                description: "Version of node to build on"
                default: "22.x"
                required: false
                type: string
        secrets:
            npm_pat:
                description: The PAT for NPM registry access
                required: true
            sonar_token:
                description: The User Token as a replacement of the user login
                required: true

jobs:
    sonarqube:
        runs-on: ubuntu-latest
        name: "SonarQube scan (node ${{ inputs.node-version }})"
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Setup node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .nvmrc
                  registry-url: "https://npm.pkg.github.com"
                  scope: "@move-frontend"
                  cache: "yarn"

            - name: Install dependencies
              run: yarn install --production=false --frozen-lockfile
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.npm_pat }}

            - name: Run test coverage
              run: yarn coverage

            - name: Run SonarQube scan
              run: yarn sonar
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
